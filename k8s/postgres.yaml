apiVersion: apps/v1
kind: StatefulSet
metadata:
    name: postgres
spec:
    selector:
        matchLabels:
            app: postgres
    serviceName: postgres
    replicas: 1
    template:
        metadata:
            labels:
                app: postgres
        spec:
            containers:
                - name: postgres
                  image: postgres:14.18
                  ports:
                      - containerPort: 5432
                  env:
                      - name: POSTGRES_DB
                        value: "content_simplifier"
                      - name: POSTGRES_USER
                        valueFrom:
                            secretKeyRef:
                                name: app-secret
                                key: DB_USER
                      - name: POSTGRES_PASSWORD
                        valueFrom:
                            secretKeyRef:
                                name: app-secret
                                key: DB_PASSWORD
                  envFrom:
                      - configMapRef:
                            name: app-config
                  volumeMounts:
                      - name: postgres-storage
                        mountPath: /var/lib/postgresql/data
            volumes:
                - name: postgres-storage
                  emptyDir: {}