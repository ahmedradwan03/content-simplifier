services:
  app:
    container_name: nodeImage-container
    build: .
    ports:
      - 3000:3000
    depends_on:
      - redis
      - postgres
    env_file:
      - ./.env
    environment:
      DB_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - .:/app
      - /app/node_modules
    command: npm run start:dev

  redis:
    image: redis:latest
    ports:
      - '6379:6379'

  postgres:
    image: postgres:14.18
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
