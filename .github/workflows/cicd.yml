name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Use Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/content-simplifier:latest
            ${{ secrets.DOCKER_USERNAME }}/content-simplifier:${{ github.sha }}

  cd:
    needs: ci
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4

      - name: Install kind & create cluster
        run: |
          curl -Lo kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x kind && sudo mv kind /usr/local/bin/kind
          kind create cluster

      - name: Load image into kind
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/content-simplifier:${{ github.sha }}
          kind load docker-image ${{ secrets.DOCKER_USERNAME }}/content-simplifier:${{ github.sha }}

      - name: Update image tag
        run: sed -i "s|IMAGE_TAG|${{ github.sha }}|g" k8s/app.yaml

      - name: Create ConfigMap and Secret
        run: |
          kubectl create configmap app-config \
            --from-literal=NODE_ENV=production \
            --from-literal=PORT=3000 \
            --dry-run=client -o yaml | kubectl apply -f -

          kubectl create secret generic app-secret \
            --from-literal=ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy all k8s manifests
        run: kubectl apply -f k8s/

      - name: Wait for rollout
        run: kubectl rollout status deployment/node-app --timeout=120s

      - name: Check pods & services
        run: kubectl get pods,svc

      - name: Debug on failure
        if: failure()
        run: |
          kubectl get pods -o wide
          kubectl describe deployment/node-app
          kubectl describe pods
          kubectl get events --sort-by='.lastTimestamp'