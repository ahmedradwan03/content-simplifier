name: CI/CD

on:
    push:
        branches:
            - main

jobs:
    ci:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Use Node.js 24
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Run tests
              run: npm test

            - name: Docker Login
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build and Push Docker Image
              uses: docker/build-push-action@v4
              with:
                  context: .
                  push: true
                  tags: |
                      ${{ secrets.DOCKER_USERNAME }}/content-simplifier:latest
                      ${{ secrets.DOCKER_USERNAME }}/content-simplifier:${{ github.sha }}
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Done
              run: echo "Image pushed to Docker Hub successfully!"

    cd:
        needs: ci
        runs-on: ubuntu-latest
        environment: production

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup kubeconfig
              run: |
                  mkdir -p $HOME/.kube
                  echo "${{ secrets.KUBE_CONFIG }}" | base64 -d > $HOME/.kube/config
                  chmod 600 $HOME/.kube/config

            - name: Setup kubectl
              uses: azure/setup-kubectl@v4

            - name: Deploy new image
              run: |
                  kubectl set image deployment/node-app \
                  node-app=${{ secrets.DOCKER_USERNAME }}/content-simplifier:${{ github.sha }}

            - name: Wait for rollout
              run: |
                  kubectl rollout status deployment/node-app --timeout=120s

            - name: Check pods
              run: |
                  kubectl get pods -l app=node-app
