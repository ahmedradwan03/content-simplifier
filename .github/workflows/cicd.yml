name: CI/CD

on:
    push:
        branches:
            - main

jobs:
    ci:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Use Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            # - name: Run tests
            #   run: npm test

            - name: Docker Login
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build and Push Docker Image
              uses: docker/build-push-action@v4
              with:
                  context: .
                  push: true
                  tags: |
                      ${{ secrets.DOCKER_USERNAME }}/content-simplifier:latest
                      ${{ secrets.DOCKER_USERNAME }}/content-simplifier:${{ github.sha }}

            - name: Done
              run: echo "Image pushed to Docker Hub successfully!"

    cd:
        needs: ci
        runs-on: ubuntu-latest
        environment: production

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup kubectl
              uses: azure/setup-kubectl@v4

            - name: Install kind
              run: |
                  curl -Lo kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
                  chmod +x kind
                  sudo mv kind /usr/local/bin/kind

            - name: Create cluster
              run: kind create cluster

            - name: Load Docker image into kind
              run: |
                  docker pull ${{ secrets.DOCKER_USERNAME }}/content-simplifier:${{ github.sha }}
                  kind load docker-image ${{ secrets.DOCKER_USERNAME }}/content-simplifier:${{ github.sha }}

            - name: Deploy app
              run: |
                  kubectl create deployment node-app \
                    --image=${{ secrets.DOCKER_USERNAME }}/content-simplifier:${{ github.sha }} \
                    --dry-run=client -o yaml | kubectl apply -f -

            - name: Expose app
              run: |
                  kubectl expose deployment node-app \
                    --type=NodePort \
                    --port=3000 \
                    --dry-run=client -o yaml | kubectl apply -f -

            - name: Wait for rollout
              run: kubectl rollout status deployment/node-app

            - name: Check pods
              run: kubectl get pods

            - name: Debug info (if needed)
              run: |
                  kubectl describe pods
                  kubectl get svc
