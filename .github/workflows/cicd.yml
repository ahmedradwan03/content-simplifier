name: CI/CD

on:
    push:
        branches:
            - main

jobs:
    ci:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Use Node.js 20
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            # - name: Run tests
            #   run: npm test

            - name: Docker Login
              uses: docker/login-action@v4
              with:
                  username: ${{ secrets.DOCKER_USERNAME }}
                  password: ${{ secrets.DOCKER_PASSWORD }}

            - name: Build and Push Docker Image
              uses: docker/build-push-action@v4
              with:
                  context: .
                  push: true
                  tags: |
                      ${{ secrets.DOCKER_USERNAME }}/content-simplifier:latest
                      ${{ secrets.DOCKER_USERNAME }}/content-simplifier:${{ github.sha }}

            - name: Done
              run: echo "Image pushed to Docker Hub successfully!"

    cd:
        needs: ci
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Setup kubectl
              uses: azure/setup-kubectl@v4

            - name: Create kind cluster
              run: kind create cluster

            - name: Deploy app
              run: |
                  kubectl create deployment node-app \
                     --image=${{ secrets.DOCKER_USERNAME }}/content-simplifier:${{ github.sha }}

            - name: Run pods
              run: kubectl get pods
