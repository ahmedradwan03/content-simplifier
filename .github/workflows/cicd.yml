name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
      - run: npm ci
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/content-simplifier:latest
            ${{ secrets.DOCKER_USERNAME }}/content-simplifier:${{ github.sha }}

  cd:
    needs: ci
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-kubectl@v4
      - name: Setup kind cluster
        run: |
          curl -Lo kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x kind && sudo mv kind /usr/local/bin/kind
          kind create cluster
      - name: Load image
        run: |
          docker pull ${{ secrets.DOCKER_USERNAME }}/content-simplifier:${{ github.sha }}
          kind load docker-image ${{ secrets.DOCKER_USERNAME }}/content-simplifier:${{ github.sha }}
      - name: Create config & secrets
        run:
          kubectl create secret generic app-secret \
            --from-literal=DB_USER=${{ secrets.DB_USER }} \
            --from-literal=DB_PASSWORD=${{ secrets.DB_PASSWORD }} \
            --from-literal=JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }} \
            --from-literal=OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            --from-literal=GROQ_API_KEY=${{ secrets.GROQ_API_KEY }} \
            --dry-run=client -o yaml | kubectl apply -f -
      - name: Deploy
        run: |
          sed -i "s|IMAGE_TAG|${{ github.sha }}|g" k8s/app.yaml
          kubectl apply -f k8s/
          kubectl rollout status deployment/node-app --timeout=120s
      - run: kubectl get pods,svc
      - if: failure()
        run: kubectl describe pods && kubectl get events --sort-by='.lastTimestamp'